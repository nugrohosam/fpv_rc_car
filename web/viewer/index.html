<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPV RC Car Viewer</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-size: 2rem;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }

        .status {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #888;
        }

        .status-dot.connected {
            background: #4ade80;
            box-shadow: 0 0 10px #4ade80;
        }

        .status-dot.connecting {
            background: #fbbf24;
            animation: pulse 1s infinite;
        }

        .status-dot.disconnected {
            background: #f87171;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .video-container {
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            position: relative;
            transition: height 0.25s ease;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            background: #1a1a1a;
            transform-origin: center center;
            transition: transform 0.25s ease;
        }

        .rotation-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .rotate-btn {
            padding: 8px 18px;
            font-size: 20px;
            background: #374151;
            border-radius: 8px;
        }

        .rotate-btn:hover {
            background: #4b5563;
        }

        .rotation-label {
            font-size: 13px;
            color: #888;
            min-width: 36px;
            text-align: center;
        }

        .placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }

        .placeholder svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
        }

        .controls {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        input::placeholder {
            color: #666;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: #7c3aed;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #6d28d9;
        }

        button:disabled {
            background: #444;
            cursor: not-allowed;
        }

        .info {
            text-align: center;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #4ade80;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 FPV RC Car Viewer</h1>
        <p class="subtitle">Watch the live stream from your vehicle</p>

        <div class="status">
            <div class="status-item">
                <div class="status-dot" id="connectionStatus"></div>
                <span id="connectionText">Not Connected</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="signalStatus"></div>
                <span id="signalText">No Signal</span>
            </div>
        </div>

        <div class="video-container" id="videoContainer">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="placeholder" id="placeholder">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                </svg>
                <p>Waiting for video stream...</p>
            </div>
        </div>

        <div class="rotation-controls">
            <button class="rotate-btn" onclick="rotateLeft()" title="Rotate 90° left">↺</button>
            <span class="rotation-label" id="rotationAngle">0°</span>
            <button class="rotate-btn" onclick="rotateRight()" title="Rotate 90° right">↻</button>
        </div>

        <div class="controls">
            <div class="input-group">
                <input
                    type="text"
                    id="vehicleIp"
                    placeholder="Enter Vehicle IP Address (e.g., 100.x.x.x)"
                    autocomplete="off"
                >
                <button id="connectBtn" onclick="connect()">Connect</button>
            </div>
            <p class="info">
                Make sure the vehicle is running and both devices are on the same TailScale network.
            </p>
        </div>

        <div class="stats" id="stats" style="display: none;">
            <div class="stat">
                <div class="stat-value" id="bitrate">0</div>
                <div class="stat-label">kbps</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="fps">0</div>
                <div class="stat-label">FPS</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="packetLoss">0%</div>
                <div class="stat-label">Packet Loss</div>
            </div>
        </div>
    </div>

    <script>
        let peerConnection = null;
        let remoteVideo = document.getElementById('remoteVideo');
        let placeholder = document.getElementById('placeholder');
        const connectBtn = document.getElementById('connectBtn');

        // No STUN/TURN - direct TailScale IP only
        const rtcConfig = {
            iceServers: [],
            iceTransportPolicy: 'all',
            bundlePolicy: 'max-bundle',
            rtcpMuxPolicy: 'require'
        };

        // Prefer VP8 and cap bandwidth to 200 kbps in SDP
        function modifySdp(sdp) {
            const lines = sdp.split('\r\n');
            let vp8Payload = null;
            for (const line of lines) {
                const match = line.match(/^a=rtpmap:(\d+) VP8\//);
                if (match) { vp8Payload = match[1]; break; }
            }
            const result = [];
            let inVideo = false;
            let bandwidthAdded = false;
            for (const line of lines) {
                if (line.startsWith('m=video')) {
                    inVideo = true;
                    bandwidthAdded = false;
                    if (vp8Payload) {
                        const parts = line.split(' ');
                        const payloads = parts.slice(3);
                        const idx = payloads.indexOf(vp8Payload);
                        if (idx > 0) { payloads.splice(idx, 1); payloads.unshift(vp8Payload); }
                        result.push(parts.slice(0, 3).join(' ') + ' ' + payloads.join(' '));
                        continue;
                    }
                } else if (line.startsWith('m=')) {
                    inVideo = false;
                }
                if (inVideo && !bandwidthAdded && line.startsWith('c=')) {
                    result.push(line);
                    result.push('b=AS:200');
                    bandwidthAdded = true;
                    continue;
                }
                result.push(line);
            }
            return result.join('\r\n');
        }

        let rotation = 0;

        function rotateLeft() {
            rotation = (rotation - 90 + 360) % 360;
            applyRotation();
        }

        function rotateRight() {
            rotation = (rotation + 90) % 360;
            applyRotation();
        }

        function applyRotation() {
            const container = document.getElementById('videoContainer');
            const isPortrait = rotation % 180 !== 0;

            if (isPortrait) {
                const aspect = (remoteVideo.videoWidth && remoteVideo.videoHeight)
                    ? remoteVideo.videoWidth / remoteVideo.videoHeight
                    : 4 / 3;
                const cw = container.offsetWidth;
                // Size container for the rotated frame
                container.style.height = (cw * aspect) + 'px';
                // Center the video element inside the taller container
                // so the rotation pivot is at the container's center
                container.style.display = 'flex';
                container.style.alignItems = 'center';
                container.style.justifyContent = 'center';
                remoteVideo.style.transform = `rotate(${rotation}deg) scale(${aspect})`;
            } else {
                container.style.height = '';
                container.style.display = '';
                container.style.alignItems = '';
                container.style.justifyContent = '';
                remoteVideo.style.transform = rotation === 0 ? '' : `rotate(${rotation}deg)`;
            }
            document.getElementById('rotationAngle').textContent = rotation + '°';
        }

        async function connect() {
            const vehicleIp = document.getElementById('vehicleIp').value.trim();
            if (!vehicleIp) {
                alert('Please enter the vehicle IP address');
                return;
            }

            connectBtn.disabled = true;
            connectBtn.textContent = 'Connecting...';
            updateConnectionStatus('connecting', 'Connecting...');

            try {
                // Create peer connection
                peerConnection = new RTCPeerConnection(rtcConfig);

                // Handle incoming stream
                peerConnection.ontrack = (event) => {
                    console.log('Received track:', event.track.kind);
                    if (event.streams && event.streams[0]) {
                        remoteVideo.srcObject = event.streams[0];
                        placeholder.style.display = 'none';
                        updateSignalStatus('connected', 'Signal Active');
                        document.getElementById('stats').style.display = 'flex';
                    }
                };

                // Handle ICE candidates
                peerConnection.onicecandidate = (event) => {
                    if (event.candidate) {
                        console.log('ICE candidate:', event.candidate.candidate);
                    }
                };

                peerConnection.oniceconnectionstatechange = () => {
                    console.log('ICE state:', peerConnection.iceConnectionState);
                    if (peerConnection.iceConnectionState === 'connected' ||
                        peerConnection.iceConnectionState === 'completed') {
                        updateConnectionStatus('connected', 'Connected');
                        updateSignalStatus('connected', 'Signal Active');
                    } else if (peerConnection.iceConnectionState === 'disconnected' ||
                               peerConnection.iceConnectionState === 'failed') {
                        updateConnectionStatus('disconnected', 'Disconnected');
                        updateSignalStatus('disconnected', 'No Signal');
                    }
                };

                // Create offer with VP8 preference and bandwidth cap
                const rawOffer = await peerConnection.createOffer({
                    offerToReceiveAudio: false,
                    offerToReceiveVideo: true
                });
                const offer = new RTCSessionDescription({
                    type: rawOffer.type,
                    sdp: modifySdp(rawOffer.sdp)
                });
                await peerConnection.setLocalDescription(offer);

                // Send offer to signaling server on localhost
                const response = await fetch(`http://localhost:8888/signal`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'offer',
                        sdp: {
                            sdp: offer.sdp,
                            type: offer.type
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                // Set remote description (answer from vehicle)
                if (data.type === 'answer' && data.sdp) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.sdp));
                }

                // Add ICE candidates from response
                if (data.iceCandidates && Array.isArray(data.iceCandidates)) {
                    for (const candidateData of data.iceCandidates) {
                        await peerConnection.addIceCandidate(new RTCIceCandidate(candidateData));
                    }
                }

                connectBtn.textContent = 'Disconnect';
                connectBtn.disabled = false;
                connectBtn.onclick = disconnect;

                // Start stats monitoring
                setInterval(updateStats, 1000);

            } catch (error) {
                console.error('Connection error:', error);
                alert(`Connection failed: ${error.message}`);
                connectBtn.disabled = false;
                connectBtn.textContent = 'Connect';
                updateConnectionStatus('disconnected', 'Connection Failed');
            }
        }

        function disconnect() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            remoteVideo.srcObject = null;
            placeholder.style.display = 'block';
            document.getElementById('stats').style.display = 'none';
            connectBtn.textContent = 'Connect';
            connectBtn.onclick = connect;
            updateConnectionStatus('disconnected', 'Disconnected');
            updateSignalStatus('disconnected', 'No Signal');
        }

        function updateConnectionStatus(status, text) {
            const dot = document.getElementById('connectionStatus');
            const textEl = document.getElementById('connectionText');
            dot.className = 'status-dot ' + status;
            textEl.textContent = text;
        }

        function updateSignalStatus(status, text) {
            const dot = document.getElementById('signalStatus');
            const textEl = document.getElementById('signalText');
            dot.className = 'status-dot ' + status;
            textEl.textContent = text;
        }

        let lastBytes = 0;
        let lastTimestamp = Date.now();

        async function updateStats() {
            if (!peerConnection || peerConnection.iceConnectionState !== 'connected') return;

            try {
                const stats = await peerConnection.getStats(null);
                let bitrate = 0;
                let fps = 0;
                let packetsLost = 0;
                let packetsReceived = 0;

                stats.forEach(report => {
                    if (report.type === 'inbound-rtp' && report.mediaType === 'video') {
                        const now = Date.now();
                        const bytes = report.bytesReceived || 0;
                        const timeDiff = (now - lastTimestamp) / 1000;
                        const bytesDiff = bytes - lastBytes;

                        if (timeDiff > 0) {
                            bitrate = Math.round((bytesDiff * 8) / timeDiff / 1000);
                        }

                        lastBytes = bytes;
                        lastTimestamp = now;

                        fps = report.framesPerSecond || 0;
                        packetsLost = report.packetsLost || 0;
                        packetsReceived = report.packetsReceived || 0;
                    }
                });

                const totalPackets = packetsLost + packetsReceived;
                const packetLoss = totalPackets > 0 ? Math.round((packetsLost / totalPackets) * 100) : 0;

                document.getElementById('bitrate').textContent = bitrate;
                document.getElementById('fps').textContent = fps;
                document.getElementById('packetLoss').textContent = packetLoss + '%';

            } catch (error) {
                console.error('Stats error:', error);
            }
        }

        // Handle Enter key
        document.getElementById('vehicleIp').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') connect();
        });
    </script>
</body>
</html>
